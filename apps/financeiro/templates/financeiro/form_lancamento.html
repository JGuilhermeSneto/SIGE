{% extends 'core/base.html' %}
{% load static %}

{% block title %}Novo Lançamento Financeiro — SIGE{% endblock %}

{% block extra_css %}
<style>
    .bi-container { padding: 30px; animation: fadeIn 0.5s ease-out; }
    .form-container { max-width: 650px; margin: 40px auto; }
    
    .bi-card { 
        background: var(--bg-surface); border: 1px solid var(--border-subtle); 
        border-radius: 32px; padding: 48px; box-shadow: var(--shadow-lg);
        position: relative; overflow: hidden;
    }
    .bi-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
        background: linear-gradient(90deg, var(--accent-violet), var(--accent-cyan));
    }

    .form-group { margin-bottom: 28px; }
    .form-label { 
        display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); 
        text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.1em;
    }
    
    .form-control { 
        width: 100%; padding: 16px 24px; border-radius: 16px; 
        background: var(--bg-elevated); border: 1px solid var(--border-subtle); 
        color: var(--text-primary); font-size: 1rem; transition: all 0.3s;
        font-weight: 600;
    }
    .form-control:focus { border-color: var(--accent-cyan); outline: none; background: var(--bg-surface); box-shadow: 0 0 20px rgba(0, 188, 212, 0.1); }

    .btn-submit { 
        width: 100%; padding: 18px; border-radius: var(--radius-xl); 
        background: var(--accent-violet); color: white; font-weight: 900; 
        border: none; cursor: pointer; transition: all 0.3s; margin-top: 30px;
        font-size: 1rem; letter-spacing: 0.05em;
        box-shadow: 0 8px 20px rgba(124, 111, 255, 0.3);
    }
    .btn-submit:hover { transform: translateY(-4px); filter: brightness(1.1); box-shadow: 0 12px 25px rgba(124, 111, 255, 0.4); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% endblock %}

{% block content %}
<div class="bi-container">
    <div class="form-container">
        <div class="bi-card">
            <h2 style="color: var(--text-primary); margin-top: 0; margin-bottom: 10px; font-size: 2rem; font-weight: 950; letter-spacing: -0.04em;">
                Registrar <span style="color: var(--accent-violet);">Operação</span>
            </h2>
            <p style="color: var(--text-muted); margin-bottom: 40px; font-weight: 600; font-size: 0.9rem;">Insira os dados da movimentação para o livro diário</p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label class="form-label">Tipo</label>
                        <select name="tipo" class="form-control" style="border-left: 4px solid var(--accent-cyan);">
                            <option value="ENTRADA">📈 Entrada (Receita)</option>
                            <option value="SAIDA">📉 Saída (Gasto)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" name="valor" class="form-control" placeholder="0,00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Descrição do Lançamento</label>
                    <input type="text" name="descricao" class="form-control" placeholder="Ex: Pagamento Internet Link Dedicado" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Categoria de Centro de Custo</label>
                    <select name="categoria" class="form-control" required>
                        <option value="" disabled selected>Selecione uma categoria...</option>
                        {% for c in categorias %}
                        <option value="{{ c.id }}">{{ c.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Data de Competência</label>
                    <input type="date" name="data_pagamento" class="form-control" value="{{ hoje|date:'Y-m-d' }}">
                </div>

                <button type="submit" class="btn-submit">CONFIRMAR LANÇAMENTO</button>
                <a href="{% url 'financeiro:painel_financeiro' %}" style="display: block; text-align: center; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">Desistir e Voltar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
