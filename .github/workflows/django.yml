name: SIGE CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Django Tests + Lint + Coverage
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sige
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    # 1️⃣ Pega o código do repositório
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Instala Python 3.12
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3️⃣ Instala dependências do projeto
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint mypy coverage

    # 4️⃣ Roda migrations do Django (com variáveis de ambiente do MySQL)
    - name: Run migrations
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_USER: root
        MYSQL_PASSWORD: root
        MYSQL_DATABASE: sige
      run: |
        python manage.py migrate

    # 5️⃣ Executa os testes e coleta coverage
    - name: Run tests with coverage
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_USER: root
        MYSQL_PASSWORD: root
        MYSQL_DATABASE: sige
      run: |
        coverage run --source='.' manage.py test
        coverage report -m

    # 6️⃣ Checa qualidade do código com linting
    - name: Lint Python code
      run: |
        flake8 .
        pylint **/*.py
        mypy .
