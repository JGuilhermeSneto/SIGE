services:
  - type: web
    name: sige-app
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # Você vai colar a URL do Aiven aqui no painel do Render
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_REDIS
        value: "False"
