<!DOCTYPE html>
<html lang="pt-br" data-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção — SIGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #090e1a;
            --bg-surface: #0f1729;
            --accent-violet: #7c6fff;
            --text-primary: #eef2ff;
            --text-secondary: #8b97bb;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            z-index: 10;
        }

        .icon-box {
            font-size: 5rem;
            color: var(--accent-violet);
            margin-bottom: 30px;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .badge-manutencao {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: rgba(124, 111, 255, 0.1);
            border: 1px solid rgba(124, 111, 255, 0.3);
            border-radius: 50px;
            color: var(--accent-violet);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-violet);
            border-radius: 50%;
            animation: dotFlashing 1s infinite alternate;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(124, 111, 255, 0)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(124, 111, 255, 0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(124, 111, 255, 0)); }
        }

        @keyframes dotFlashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        /* Background effects */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 111, 255, 0.08) 0%, rgba(124, 111, 255, 0) 70%);
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <div class="badge-manutencao">
            <i class="fa-solid fa-screwdriver-wrench"></i> Modo Manutenção
        </div>
        <div class="icon-box">
            <i class="fa-solid fa-rocket"></i>
        </div>
        <h1>Estamos <span style="color: var(--accent-violet);">evoluindo</span> para você.</h1>
        <p>{{ mensagem }}</p>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div style="margin-top: 50px;">
            <img src="https://logodownload.org/wp-content/uploads/2014/10/google-logo-5.png" alt="SIGE" style="height: 24px; filter: grayscale(1) brightness(2) opacity(0.3);">
        </div>
    </div>
</body>
</html>
