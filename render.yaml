services:
  - type: web
    name: sige-app
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: USE_REDIS
        value: "False"
      - key: SERVE_MEDIA_FILES
        value: "False"
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sige-g7w2.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sige-g7w2.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  - type: worker
    name: sige-worker
    env: python
    buildCommand: ./build.sh
    startCommand: celery -A config worker --loglevel=info
    plan: free
    envVars:
      - fromService:
          name: sige-app
          type: web
        envVarKey: DATABASE_URL
      - fromService:
          name: sige-app
          type: web
        envVarKey: USE_REDIS
      - fromService:
          name: sige-app
          type: web
        envVarKey: CELERY_BROKER_URL
      - fromService:
          name: sige-app
          type: web
        envVarKey: CELERY_RESULT_BACKEND

  - type: web
    name: sige-flower
    env: python
    buildCommand: ./build.sh
    startCommand: celery -A config flower --port=$PORT --basic-auth=$FLOWER_USER:$FLOWER_PASSWORD
    plan: free
    envVars:
      - key: FLOWER_USER
        value: admin
      - key: FLOWER_PASSWORD
        generateValue: true
      - fromService:
          name: sige-app
          type: web
        envVarKey: CELERY_BROKER_URL
