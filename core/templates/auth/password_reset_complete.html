{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SIGE · Senha Atualizada</title>
    <link rel="icon" type="image/x-icon" href="{% static 'core/img/favicon.ico' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #090e1a;
            --surface: #0f1729;
            --elevated: #131e33;
            --border: rgba(255,255,255,.07);
            --border-mid: rgba(255,255,255,.13);
            --accent: #7c6fff;
            --text: #eef2ff;
            --muted: #7986a8;
            --emerald: #34d399;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: fadeIn .5s ease;
            text-align: center;
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--emerald), transparent);
        }

        .icon-box {
            width: 80px; height: 80px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px;
            color: var(--emerald);
            font-size: 2.5rem;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text);
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-login {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all .2s;
            box-shadow: 0 8px 20px rgba(124,111,255,.2);
        }
        .btn-login:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124,111,255,.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="icon-box">
            <i class="fa-solid fa-shield-check"></i>
        </div>

        <h2 class="brand-name">SIGE</h2>
        
        <h1>Tudo pronto!</h1>
        
        <p>
            Sua nova senha foi configurada com sucesso. Agora você já pode acessar o sistema com suas novas credenciais.
        </p>

        <a href="{% url 'login' %}" class="btn-login">
            ACESSAR MINHA CONTA
        </a>
    </div>
</body>
</html>
