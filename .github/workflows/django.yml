name: SIGE CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DJANGO_SETTINGS_MODULE: config.settings
  PYTHON_VERSION: "3.12"

# ──────────────────────────────────────────────────────────
# CI — roda em PARALELO para feedback rápido
# ──────────────────────────────────────────────────────────
jobs:
  # ── JOB 1: Qualidade de Código (sem banco de dados) ──
  lint:
    name: "🔍 Lint & Style"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pylint-django

      - name: flake8 — erros de sintaxe e imports críticos
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      - name: flake8 — estilo geral (não bloqueia build)
        run: flake8 .
        continue-on-error: true

      - name: pylint — erros de código reais
        env:
          DJANGO_SETTINGS_MODULE: config.settings
        run: |
          pylint apps/ \
            --errors-only \
            --disable=E1101,E1103,E5141
        continue-on-error: true

  # ── JOB 2: Segurança ──
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: bandit — análise de vulnerabilidades no código
        run: |
          bandit -r apps/ \
            -x apps/*/migrations/ \
            --severity-level medium \
            -f screen
        continue-on-error: true

      - name: pip-audit — verifica dependências vulneráveis
        run: pip-audit -r requirements.txt --skip-editable
        continue-on-error: true

  # ── JOB 3: Testes + Coverage (com MySQL) ──
  test:
    name: "🧪 Tests & Coverage"
    runs-on: ubuntu-latest
    needs: lint

    env:
      DB_ENGINE: django.db.backends.mysql
      DB_NAME: sige
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      DEBUG: "True"

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sige
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libcairo2-dev pkg-config python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check --deploy
        env:
          DEBUG: "False"
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-insecure-check-key' }}
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        continue-on-error: true

      - name: Apply migrations
        run: python manage.py migrate

      - name: Run tests with coverage
        run: |
          coverage run manage.py test --verbosity=2
          coverage report -m
          coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Coverage summary (PR comment)
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
        continue-on-error: true

  # ──────────────────────────────────────────────────────────
  # CD — roda APENAS no push da branch main (após CI verde)
  # ──────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ secrets.DEPLOY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "📥 Atualizando código..."
            git pull origin main

            echo "📦 Instalando dependências..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "🗄️ Aplicando migrações..."
            python manage.py migrate --no-input

            echo "🗂️ Coletando arquivos estáticos..."
            python manage.py collectstatic --no-input

            echo "♻️ Reiniciando serviço..."
            sudo systemctl restart sige.service || sudo systemctl restart gunicorn

            echo "✅ Deploy concluído!"