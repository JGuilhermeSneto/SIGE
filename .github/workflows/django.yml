name: SIGE CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DB_ENGINE: django.db.backends.mysql
  DB_NAME: sige
  DB_USER: root
  DB_PASSWORD: root
  DB_HOST: 127.0.0.1
  DB_PORT: "3306"
  DJANGO_SETTINGS_MODULE: config.settings

jobs:
  test:
    name: Django Tests + Lint + Coverage
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sige
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install system dependencies
      run: sudo apt-get install -y libcairo2-dev pkg-config python3-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Django system check
      run: python manage.py check

    - name: Run migrations
      run: python manage.py migrate

    - name: Run tests with coverage
      run: |
        coverage run --source='.' manage.py test
        coverage report -m

    - name: Lint - flake8 (erros críticos apenas)
      run: |
        # Falha apenas em erros de sintaxe e imports indefinidos (E9, F63, F7, F82)
        # Usa as configurações do .flake8 para warnings de estilo
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint - pylint (erros críticos apenas)
      run: |
        # Roda apenas para erros de código real (E-level), ignora warnings de estilo
        pylint apps/ --errors-only --disable=E1101,E1103
      continue-on-error: true

    - name: Type check - mypy
      run: mypy . --ignore-missing-imports
      continue-on-error: true