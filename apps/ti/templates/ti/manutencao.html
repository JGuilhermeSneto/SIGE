<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manutenção em Andamento — SIGE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1115;
            --accent: #06b6d4;
            --text: #e2e8f0;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            padding: 40px;
            max-width: 500px;
            z-index: 2;
        }
        .icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        h1 { font-size: 2.5rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        p { opacity: 0.7; line-height: 1.6; margin-top: 20px; }
        .timer {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            margin-top: 30px;
            font-family: monospace;
            font-size: 1.1rem;
        }
        .bg-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            z-index: 1;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <i class="fa-solid fa-screwdriver-wrench icon"></i>
        <h1>{{ manutencao.titulo }}</h1>
        <p>Estamos realizando melhorias programadas para garantir a estabilidade do SIGE. Voltaremos em breve!</p>
        
        <div class="timer">
            Retorno previsto: <strong>{{ manutencao.fim|date:"H:i" }}h</strong> ({{ manutencao.fim|date:"d/m" }})
        </div>

        <div style="margin-top: 40px; font-size: 0.8rem; opacity: 0.5;">
            Operações SIGE Central · Protocolo MNT-{{ manutencao.id }}
        </div>
    </div>
</body>
</html>
