version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"  # Onde está o requirements.txt
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "django"
        versions:
          - ">=5.0.0,<6.0.0"
    allow:
      - dependency-type: "all"
