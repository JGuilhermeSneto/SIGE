{# apps/ti/templates/ti/backups/_hero.html #}
<div class="vault-hero" id="heroCard">
    <div class="shine"></div>
    <span class="vault-hero__badge">PROTOCOLO: WORM-ACTIVE</span>

    <div class="vault-hero__inner">
      <div class="orbital-wrap">
        <div class="orbital-ring"></div>
        <div class="orbital-core"><i class="fa-solid fa-vault"></i></div>
      </div>

      <div class="vault-hero__body">
        <div class="vault-hero__label">SISTEMA DE PERSISTÊNCIA</div>
        <h2 class="vault-hero__heading">Apex Immutable Vault</h2>
        <p class="vault-hero__sub">Criptografia <strong>AES-256-GCM</strong> · Replicação Multi-Zona</p>

        <div class="stat-row">
          <div class="stat-cell">
            <div class="stat-cell__label">DURABILIDADE</div>
            <div class="stat-cell__value" style="color: var(--c-emerald);">99.999%</div>
          </div>
          <div class="stat-cell">
            <div class="stat-cell__label">INTEGRIDADE</div>
            <div class="stat-cell__value" style="color: var(--c-cyan);">VERIFIED</div>
          </div>
          <div class="stat-cell">
            <div class="stat-cell__label">ZONAS</div>
            <div class="stat-cell__value" style="color: var(--c-violet);">03 NODES</div>
          </div>
        </div>
      </div>
    </div>
</div>
