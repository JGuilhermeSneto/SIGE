{# apps/ti/templates/ti/backups/_row.html #}
<div class="snap-row">
  <div class="shine"></div>
  <div>
    <div class="snap-filename">{{ b.arquivo }}</div>
    <div class="snap-date">
      <i class="fa-solid fa-calendar-check"></i>
      {{ b.data_inicio|date:"d M Y · H:i:s" }}
    </div>
  </div>

  <div>
    <div class="snap-size">{{ b.tamanho_bytes|filesizeformat }}</div>
    <div class="snap-enc">AES-256 · SHA-256-HASH</div>
  </div>

  <div style="padding-right: 20px;">
    <div class="ttl-label">
      <span>ID {{ b.id|stringformat:"03d" }}</span>
      <span>30 DAYS TTL</span>
    </div>
    <div class="ttl-bar">
      <div class="ttl-fill" style="width: 25%;"></div>
    </div>
  </div>

  <div>
    <span class="status-chip {% if b.status == 'SUCESSO' %}status-chip--ok{% else %}status-chip--err{% endif %}">
      <i class="fa-solid {% if b.status == 'SUCESSO' %}fa-circle-check{% else %}fa-circle-xmark{% endif %}"></i>
      {{ b.status }}
    </span>
  </div>

  <div class="row-actions">
    {% if b.status == 'SUCESSO' %}
    <a href="{% url 'ti:download_backup' b.id %}" class="btn-sige-primario" style="font-size: 0.55rem; padding: 4px 10px;">
      <i class="fa-solid fa-download"></i> BAIXAR
    </a>
    {% endif %}
    <button class="btn-sige-secundario" style="font-size: 0.55rem; padding: 4px 10px;">
      <i class="fa-solid fa-magnifying-glass"></i> EXPLORAR
    </button>
  </div>
</div>
