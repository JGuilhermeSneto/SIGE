{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SIGE · Recuperar Acesso</title>
    <link rel="icon" type="image/x-icon" href="{% static 'core/img/favicon.ico' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #090e1a;
            --surface: #0f1729;
            --elevated: #131e33;
            --border: rgba(255,255,255,.07);
            --border-mid: rgba(255,255,255,.13);
            --accent: #7c6fff;
            --accent-glow: rgba(124,111,255,.18);
            --text: #eef2ff;
            --muted: #7986a8;
            --dim: #3d4f72;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: fadeIn .5s ease;
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-ring {
            width: 60px; height: 60px;
            background: var(--elevated);
            border: 1px solid var(--border-mid);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-ring img { width: 30px; }
        
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .form-header { margin-bottom: 28px; text-align: center; }
        .form-header h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .form-header p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

        .field-wrap { margin-bottom: 24px; }
        .field-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .field-box {
            position: relative;
            background: var(--elevated);
            border: 1px solid var(--border-mid);
            border-radius: 12px;
            transition: all .2s;
        }
        .field-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .field-box input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 8px 20px rgba(124,111,255,.2);
        }
        .btn-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124,111,255,.3);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--muted);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color .2s;
        }
        .back-link:hover { color: var(--text); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="logo-area">
            <div class="logo-ring">
                <img src="{% static 'core/img/Logo_Branca.png' %}" alt="Logo">
            </div>
            <h2 class="brand-name">SIGE</h2>
        </div>

        <div class="form-header">
            <h1>Recuperar senha</h1>
            <p>Informe seu e-mail institucional para que possamos enviar as instruções de redefinição.</p>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="field-wrap">
                <label class="field-label">E-mail Corporativo</label>
                <div class="field-box">
                    <input type="email" name="email" id="id_email" placeholder="exemplo@sige.com" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                ENVIAR INSTRUÇÕES
            </button>

            <a href="{% url 'login' %}" class="back-link">
                <i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Voltar ao Login
            </a>
        </form>
    </div>
</body>
</html>
