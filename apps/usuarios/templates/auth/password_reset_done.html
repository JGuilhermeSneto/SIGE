{% load static %}
<!DOCTYPE html>
<html lang="pt-BR" data-theme="default">
<head>
    <meta charset="UTF-8">
    <title>SIGE · E-mail Enviado</title>
    <link rel="icon" type="image/x-icon" href="{% static 'core/img/favicon.ico' %}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'core/css/design_system/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/design_system/themes.css' %}">
    <script>
      (function () {
        try {
          var t = localStorage.getItem('sige_theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* ignore */ }
      })();
    </script>
    
    <style>
        :root {
            --bg: var(--bg-base);
            --surface: var(--bg-surface);
            --elevated: var(--bg-elevated);
            --border: var(--border-subtle);
            --border-mid: var(--border-mid);
            --accent: var(--primary);
            --text: var(--text-primary);
            --muted: var(--text-secondary);
            --emerald: var(--accent-emerald);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
            animation: fadeIn .5s ease;
            text-align: center;
            position: relative;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--emerald), transparent);
        }

        .icon-box {
            width: 80px; height: 80px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 32px;
            color: var(--emerald);
            font-size: 2.5rem;
            animation: pulse 2s infinite;
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text);
            margin-bottom: 24px;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn-return {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background: var(--elevated);
            border: 1px solid var(--border-mid);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all .2s;
        }
        .btn-return:hover {
            background: var(--surface);
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(52, 211, 153, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="icon-box">
            <i class="fa-regular fa-paper-plane"></i>
        </div>

        <h2 class="brand-name">SIGE</h2>
        
        <h1>Verifique seu e-mail</h1>
        
        <p>
            Se o endereço informado estiver em nossa base, você receberá um link seguro para redefinir sua senha em instantes.
        </p>

        <a href="{% url 'login' %}" class="btn-return">
            VOLTAR AO LOGIN
        </a>

        <div style="margin-top: 24px; font-size: 0.75rem; color: var(--muted);">
            Não recebeu? Verifique sua caixa de spam ou lixo eletrônico.
        </div>
    </div>
</body>
</html>
