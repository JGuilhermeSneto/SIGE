{% extends "ti/base_ti.html" %}
{% load static %}

{% block title %}Novo Aviso — SIGE TI{% endblock %}

{% block ti_extra_css %}
<link rel="stylesheet" href="{% static 'core/css/painel_de_superusuario.css' %}">
<style>
  .painel-sige { padding-top: 15px !important; }
  .form-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 35px; max-width: 700px; margin-top: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  .sige-input { width: 100%; background: var(--bg-base); border: 1px solid var(--border-subtle); padding: 14px; border-radius: 12px; color: white; font-family: 'Inter', sans-serif; transition: 0.2s; font-size: 0.9rem; }
  .sige-input:focus { border-color: var(--accent-violet); outline: none; box-shadow: 0 0 0 3px rgba(124, 111, 255, 0.1); }
  .form-label { display: block; font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; font-weight: 800; letter-spacing: 0.05em; }
</style>
{% endblock %}

{% block ti_content %}
<section class="painel-sige">
  <header class="header-painel">
    <div class="header-esquerda">
      <span class="header-label">TI · Comunicação</span>
      <h1>Criar <span class="nome-destaque">Aviso Global</span></h1>
    </div>
  </header>

  <div class="form-card">
    <form method="post">
      {% csrf_token %}
      
      <div style="margin-bottom: 25px;">
        <label class="form-label">Título do Comunicado</label>
        <input type="text" name="titulo" class="sige-input" placeholder="Ex: Instabilidade no Módulo Financeiro" required>
      </div>

      <div style="margin-bottom: 25px;">
        <label class="form-label">Conteúdo da Mensagem</label>
        <textarea name="mensagem" class="sige-input" rows="5" placeholder="Descreva os detalhes para os usuários..." required></textarea>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 35px;">
        <div>
          <label class="form-label">Nível de Severidade</label>
          <select name="tipo" class="sige-input" style="cursor: pointer;">
            <option value="INFO">🔹 Informativo</option>
            <option value="ALERTA">🔸 Alerta Operacional</option>
            <option value="CRITICO">🚨 Crítico / Urgente</option>
          </select>
        </div>
        <div>
          <label class="form-label">Expiração Automática</label>
          <input type="datetime-local" name="expira_em" class="sige-input">
        </div>
      </div>

      <div style="display: flex; justify-content: flex-end; gap: 15px; padding-top: 20px; border-top: 1px solid var(--border-subtle);">
        <a href="{% url 'ti:gestao_avisos' %}" class="btn-sige-secundario" style="padding: 14px 25px; text-decoration: none; border-radius: 12px;">Cancelar</a>
        <button type="submit" class="btn-sige-primario" style="background: linear-gradient(135deg, var(--accent-emerald), #059669); color: #000; border: none; padding: 14px 40px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;">
          <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> Publicar Agora
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
